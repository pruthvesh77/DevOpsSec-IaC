---
- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: yes
    upgrade: dist
    autoremove: yes

- name: Install common packages
  ansible.builtin.apt:
    name:
      - git
      - curl
      - wget
      - rsyslog
      - net-tools
      - apt-transport-https
      - ca-certificates
    state: present

- name: Ensure UFW is installed and enabled
  community.general.ufw:
    state: enabled
    policy: deny

- name: Allow SSH (port 22) through UFW
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: Configure rsyslog for centralized logging
  ansible.builtin.template:
    src: rsyslog.conf.j2
    dest: /etc/rsyslog.d/50-centralized.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart rsyslog

- name: Set timezone to UTC
  community.general.timezone:
    name: UTC