---
- name: Install Nginx
  ansible.builtin.apt:
    name: nginx
    state: present

- name: Allow HTTP (port 80) through UFW
  community.general.ufw:
    rule: allow
    port: '80'
    proto: tcp

- name: Deploy simple Nginx index page
  ansible.builtin.template:
    src: index.html.j2
    dest: /var/www/html/index.html
    owner: www-data
    group: www-data
    mode: '0644'
  notify: Restart nginx